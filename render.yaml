services:
  - type: web
    name: slooze-backend
    runtime: node
    buildCommand: npm install --legacy-peer-deps && ./node_modules/.bin/prisma generate && ./node_modules/.bin/prisma db push && ./node_modules/.bin/ts-node prisma/seed.ts
    startCommand: ./node_modules/.bin/ts-node src/main.ts
    envVars:
      - key: NODE_ENV
        value: production